<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Khushi's world</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-light: #ffd0dd;
            --pink-mid: #ffb6c1;
            --pink-deep: #e4427d;
            --pink-dark: #b33b5c;
            --yellow-soft: #fff5c0;
            --yellow-mid: #ffd95e;
            --yellow-warm: #ffbf3f;
            --yellow-gold: #f0a500;
            --bg-start: #fff8e1;
            --bg-end: #fde8f0;
            --text-dark: #3a2535;
            --text-mid: #5a3545;
            --text-soft: #8b5a6a;
            --white: #ffffff;
            --card-bg: rgba(255,255,255,0.75);
            --shadow-pink: rgba(255,140,170,0.3);
            --shadow-yellow: rgba(255,191,63,0.25);
            --radius-lg: 28px;
            --radius-xl: 40px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(145deg, var(--bg-start) 0%, #ffe8f5 50%, var(--bg-end) 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: pan-y;
            padding: 12px;
        }

        /* subtle animated background blobs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
        }
        body::before {
            width: min(340px, 60vw);
            height: min(340px, 60vw);
            background: radial-gradient(circle, var(--yellow-mid), transparent 70%);
            top: -60px;
            right: -60px;
            animation: blobFloat 8s ease-in-out infinite alternate;
        }
        body::after {
            width: min(280px, 50vw);
            height: min(280px, 50vw);
            background: radial-gradient(circle, var(--pink-light), transparent 70%);
            bottom: -40px;
            left: -40px;
            animation: blobFloat 10s ease-in-out infinite alternate-reverse;
        }
        @keyframes blobFloat {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(20px, 20px) scale(1.1); }
        }

        /* ── Container ── */
        #world-container {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            border-radius: var(--radius-xl) var(--radius-xl) var(--radius-lg) var(--radius-lg);
            box-shadow:
                0 24px 48px -12px var(--shadow-pink),
                0 8px 20px -4px var(--shadow-yellow),
                inset 0 1px 0 rgba(255,255,255,0.9);
            overflow: hidden;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* ── Screens ── */
        .screen {
            width: 100%;
            padding: clamp(24px, 6vw, 36px) clamp(16px, 5vw, 24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: min(600px, 75vh);
            transition: opacity 0.4s ease;
        }

        .hidden { display: none !important; }

        /* ── Tap Screen ── */
        #tap-screen {
            background: linear-gradient(160deg,
                #ffd0dd 0%,
                #ffbf3f44 50%,
                #ffb6c1 100%);
            text-align: center;
            cursor: pointer;
            user-select: none;
            position: relative;
            animation: softGlow 2.4s infinite alternate;
            gap: 0;
        }

        #tap-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255, 215, 80, 0.18) 100%);
            pointer-events: none;
        }

        @keyframes softGlow {
            0% { box-shadow: inset 0 0 30px #ffe4ec, 0 10px 20px #fbaac3; }
            100% { box-shadow: inset 0 0 50px #fffacc, 0 15px 28px #ff90b0; }
        }

        .heart-tap {
            font-size: clamp(3.5rem, 14vw, 5rem);
            filter: drop-shadow(0 8px 12px #ff6380);
            margin-bottom: 0.8rem;
            animation: bounceSoft 2s infinite;
        }

        @keyframes bounceSoft {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-14px); }
        }

        .tap-text {
            font-size: clamp(1.6rem, 6.5vw, 2.2rem);
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -0.5px;
            background: rgba(255,255,255,0.5);
            padding: 0.45rem 1.4rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            box-shadow: 0 2px 12px rgba(255,180,160,0.3);
        }

        .sub-tap {
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: 500;
            margin-top: 0.75rem;
            color: var(--text-mid);
            letter-spacing: 0.5px;
        }

        .tap-deco {
            margin-top: clamp(24px, 6vw, 40px);
            font-size: clamp(2rem, 8vw, 3rem);
        }

        .tap-hint {
            margin-top: 1.2rem;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-soft);
            opacity: 0.75;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ── Journey App ── */
        #journey-app {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(170deg,
                rgba(255,250,240,0.9) 0%,
                rgba(255,240,252,0.85) 100%);
        }

        /* yellow gradient strip at top of journey */
        #journey-app::before {
            content: '';
            display: block;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--yellow-mid), var(--pink-light), var(--yellow-warm));
            flex-shrink: 0;
        }

        /* ── Journey Sections ── */
        .journey-section {
            width: 100%;
            padding: clamp(20px, 5vw, 32px) clamp(16px, 5vw, 24px);
            text-align: center;
            background: rgba(255, 250, 245, 0.8);
            position: relative;
        }

        .journey-section::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,180,180,0.3), transparent);
        }

        .section-icon {
            font-size: clamp(2.8rem, 11vw, 3.8rem);
            margin-bottom: 10px;
            filter: drop-shadow(0 5px 8px rgba(255,130,160,0.4));
            display: block;
        }

        .section-title {
            font-size: clamp(1.4rem, 5.5vw, 1.9rem);
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--pink-deep), var(--yellow-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .message-bubble {
            background: linear-gradient(135deg,
                rgba(255,255,255,0.95) 0%,
                rgba(255,253,230,0.95) 100%);
            border-radius: 32px 32px 32px 8px;
            padding: clamp(16px, 4vw, 22px) clamp(14px, 4vw, 20px);
            margin: 12px 0 8px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: 500;
            line-height: 1.6;
            color: var(--text-mid);
            box-shadow:
                0 8px 0 #ffc8d5,
                0 10px 22px rgba(255,180,190,0.3),
                inset 0 1px 0 rgba(255,255,255,0.8);
            border: 1.5px solid rgba(255,220,230,0.6);
        }

        /* yellow accent dot on message bubble corner */
        .message-bubble::before {
            content: '✦';
            position: absolute;
            top: -8px; left: 20px;
            font-size: 1rem;
            color: var(--yellow-warm);
            opacity: 0.7;
        }
        .message-bubble { position: relative; }

        /* ── Section Animations ── */
        .sports-animate { animation: sprintFade 0.9s ease-out both; }
        @keyframes sprintFade {
            0% { transform: translateX(-24px) scale(0.94); opacity: 0; }
            60% { transform: translateX(5px) scale(1.01); }
            100% { transform: translateX(0) scale(1); opacity: 1; }
        }

        .academics-animate { animation: smartFlip 1.1s ease both; }
        @keyframes smartFlip {
            0% { transform: perspective(400px) rotateX(70deg); opacity: 0; }
            60% { transform: perspective(400px) rotateX(-6deg); }
            100% { transform: perspective(400px) rotateX(0); opacity: 1; }
        }

        .art-animate { animation: paintSwirl 1.2s ease-out both; }
        @keyframes paintSwirl {
            0% { transform: rotate(-4deg) scale(0.75); opacity: 0; }
            55% { transform: rotate(2deg) scale(1.04); }
            100% { transform: rotate(0) scale(1); opacity: 1; }
        }

        .singing-animate { animation: musicalWave 1.1s ease-in-out both; }
        @keyframes musicalWave {
            0% { transform: translateY(24px) scaleY(1.1); opacity: 0; }
            65% { transform: translateY(-4px); }
            100% { transform: translateY(0) scaleY(1); opacity: 1; }
        }

        .photography-animate { animation: shutterClick 1s both; }
        @keyframes shutterClick {
            0% { filter: brightness(2.2); transform: scale(0.82); opacity:0.6; }
            40% { filter: brightness(1.15); transform: scale(1.02); opacity:1; }
            100% { filter: brightness(1); transform: scale(1); opacity: 1; }
        }

        .kindness-animate { animation: kindnessRise 1s ease-out both; }
        @keyframes kindnessRise {
            0% { transform: translateY(16px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .confidence-animate { animation: confidenceRise 1.2s both; }
        @keyframes confidenceRise {
            0% { transform: scale(0.55); opacity: 0; }
            75% { transform: scale(1.06); }
            100% { transform: scale(1); opacity: 1; }
        }

        .bright-smile-animate { animation: smileIn 1s ease-out both; }
        @keyframes smileIn {
            0% { transform: scale(0.8) rotate(-3deg); opacity: 0; }
            70% { transform: scale(1.03) rotate(1deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        /* ── Final Section ── */
        .final-section {
            background: linear-gradient(135deg,
                #fff0f5 0%,
                #fffbcc 50%,
                #ffe8f0 100%);
            border-top: 3px dashed rgba(255,150,180,0.4);
            border-bottom: 3px dashed rgba(255,191,63,0.4);
        }

        .final-gift {
            font-size: clamp(1.3rem, 5.5vw, 2rem);
            font-weight: 700;
            background: linear-gradient(135deg, #c0365e, var(--yellow-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding: clamp(20px, 5vw, 28px) clamp(14px, 4vw, 20px);
            border-radius: 24px 60px 24px 60px;
            line-height: 1.5;
        }

        /* ── Progress Dots ── */
        .progress-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            padding: 14px 16px 6px;
            flex-wrap: wrap;
            max-width: 100%;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,180,200,0.4);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex-shrink: 0;
        }

        .dot.active {
            background: linear-gradient(135deg, var(--pink-deep), var(--yellow-warm));
            transform: scale(1.5);
            box-shadow: 0 0 10px rgba(228,66,125,0.5), 0 0 20px rgba(255,191,63,0.3);
        }

        /* ── Buttons ── */
        .btn-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: clamp(12px, 3vw, 18px) clamp(16px, 4vw, 24px) clamp(20px, 5vw, 28px);
            width: 100%;
        }

        .nav-btn {
            background: linear-gradient(135deg, #fff0f5, #fffce0);
            border: none;
            border-radius: 60px;
            padding: clamp(13px, 3.5vw, 16px) clamp(28px, 8vw, 40px);
            font-family: 'Inter', sans-serif;
            font-size: clamp(1.1rem, 4.5vw, 1.4rem);
            font-weight: 700;
            color: var(--pink-dark);
            box-shadow:
                0 7px 0 #f5b0c5,
                0 12px 24px rgba(220,80,120,0.2),
                0 4px 0 rgba(255,215,80,0.4);
            transition: transform 0.08s linear, box-shadow 0.08s linear;
            touch-action: manipulation;
            cursor: pointer;
            width: 100%;
            max-width: 320px;
            letter-spacing: -0.3px;
            position: relative;
            overflow: hidden;
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,215,80,0.15), transparent);
            pointer-events: none;
        }

        .nav-btn:active {
            transform: translateY(6px);
            box-shadow:
                0 1px 0 #f5b0c5,
                0 4px 10px rgba(220,80,120,0.15);
        }

        .reset-btn {
            background: transparent;
            color: var(--text-soft);
            padding: 8px 20px;
            border-radius: 60px;
            border: 1.5px solid rgba(200,150,170,0.35);
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }

        .reset-btn:active {
            background: rgba(255,200,210,0.2);
        }

        /* ── Scrollable safety on tiny screens ── */
        @media (max-height: 600px) {
            body {
                align-items: flex-start;
                padding: 8px;
            }
            .screen {
                min-height: unset;
            }
        }

        /* ── Very small phones ── */
        @media (max-width: 360px) {
            body { padding: 6px; }
            #world-container { border-radius: 20px; }
        }
    </style>
</head>
<body>
    <div id="world-container">
        <!-- Screen 0: Tap to enter -->
        <div id="tap-screen" class="screen">
            <div class="heart-tap">🪄✨</div>
            <div class="tap-text">Tap to Enter</div>
            <div class="sub-tap">Khushi's world</div>
            <div class="tap-deco">🌸</div>
            <div class="tap-hint">tap anywhere</div>
        </div>

        <!-- Main journey container (hidden initially) -->
        <div id="journey-app" class="hidden">
            <div id="sections-container"></div>
            <div class="progress-dots" id="progressDots"></div>
            <div class="btn-row">
                <button class="nav-btn" id="nextBtn">continue ✨</button>
                <button class="reset-btn" id="resetBtn">↺ back to start</button>
            </div>
        </div>
    </div>

    <script>
        (function(){
            const sections = [
                { icon: "⚽🏀", title: "Sports Energy", message: "A volleyball champion, unstoppable & bright.", animation: "sports-animate" },
                { icon: "📚🧠", title: "Academics", message: "Curious mind, brilliant soul, you shine in every class and phase of life.", animation: "academics-animate" },
                { icon: "🎨🖌️", title: "Creativity", message: "Every stroke of yours turns the world into art which is not limited to just canvas. The living art. That Krishna-Radha art and bookshelf was amazing!!", animation: "art-animate" },
                { icon: "🎤🎶", title: "Musical Expression", message: "Your voice is a gentle melody that lingers in hearts. Bas mujhe kabhi gaa kar suna dena! 😁", animation: "singing-animate" },
                { icon: "📸✨", title: "Photography", message: "You capture magic in skies, making time stand still. A photographer!", animation: "photography-animate" },
                { icon: "🤝💕", title: "Kindness", message: "Your kindness wraps the world in a warm hug. You care the needy persons. So sweet of you!", animation: "kindness-animate" },
                { icon: "💪🌟", title: "Confidence", message: "You stand tall like a sunflower, bold and radiant. FEARLESS KHUSHI!", animation: "confidence-animate" },
                { icon: "😁☀️", title: "Bright Smile", message: "One smile from you could light a thousand skies. So smile please! 😁", animation: "bright-smile-animate" }
            ];

            const finalMessage = "You expected a gift? YOU are the gift. 🎁💫";

            let currentSectionIndex = 0;
            const container = document.getElementById('sections-container');
            const dotsContainer = document.getElementById('progressDots');
            const nextBtn = document.getElementById('nextBtn');
            const resetBtn = document.getElementById('resetBtn');
            const journeyApp = document.getElementById('journey-app');
            const tapScreen = document.getElementById('tap-screen');

            function renderSections() {
                let html = '';
                for (let i = 0; i < sections.length; i++) {
                    const s = sections[i];
                    const activeClass = (i === currentSectionIndex) ? '' : 'hidden';
                    html += `<div id="section-${i}" class="journey-section ${activeClass} ${s.animation}">
                        <span class="section-icon">${s.icon}</span>
                        <div class="section-title">${s.title}</div>
                        <div class="message-bubble">${s.message}</div>
                    </div>`;
                }
                const finalActiveClass = (currentSectionIndex === sections.length) ? '' : 'hidden';
                html += `<div id="final-section" class="journey-section final-section ${finalActiveClass} final-animate">
                    <span class="section-icon">🎁💖</span>
                    <div class="final-gift">${finalMessage}</div>
                </div>`;

                container.innerHTML = html;

                let dotsHtml = '';
                for (let i = 0; i <= sections.length; i++) {
                    const activeDot = (i === currentSectionIndex) ? 'active' : '';
                    dotsHtml += `<span class="dot ${activeDot}"></span>`;
                }
                dotsContainer.innerHTML = dotsHtml;

                if (currentSectionIndex === sections.length) {
                    nextBtn.textContent = '💖 aw 🥰';
                } else {
                    nextBtn.textContent = 'continue ✨';
                }
            }

            function nextSection() {
                if (currentSectionIndex < sections.length) {
                    currentSectionIndex++;
                } else {
                    currentSectionIndex = 0;
                }
                renderSections();
            }

            function resetToTap() {
                journeyApp.classList.add('hidden');
                tapScreen.classList.remove('hidden');
                currentSectionIndex = 0;
            }

            function startJourney() {
                journeyApp.classList.remove('hidden');
                tapScreen.classList.add('hidden');
                currentSectionIndex = 0;
                renderSections();
            }

            tapScreen.addEventListener('click', startJourney);
            nextBtn.addEventListener('click', nextSection);
            resetBtn.addEventListener('click', resetToTap);

            // Prevent double-tap zoom on buttons
            [nextBtn, resetBtn].forEach(btn => {
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    btn.click();
                }, { passive: false });
            });

            // Swipe support
            let touchStartX = 0, touchStartY = 0;
            journeyApp.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            journeyApp.addEventListener('touchend', (e) => {
                if (!touchStartX) return;
                const diffX = e.changedTouches[0].clientX - touchStartX;
                const diffY = e.changedTouches[0].clientY - touchStartY;
                // only horizontal swipes
                if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY) * 1.5) {
                    nextSection();
                }
                touchStartX = 0;
            }, { passive: true });

            tapScreen.classList.remove('hidden');
            journeyApp.classList.add('hidden');
            if (container) renderSections();

            // Inject final animation
            const style = document.createElement('style');
            style.innerHTML = `
                .final-animate { animation: giftPop 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
                @keyframes giftPop {
                    0% { transform: scale(0.25) rotate(-8deg); opacity: 0; }
                    65% { transform: scale(1.08) rotate(1deg); }
                    100% { transform: scale(1) rotate(0); opacity: 1; }
                }
            `;
            document.head.appendChild(style);
        })();
    </script>
</body>
</html>
